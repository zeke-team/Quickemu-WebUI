{% extends "base.html" %}
{% block title %}{{ t("create.title") }} — {{ t("app_name") }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ t("create.title") }}</h1>
</div>

<form id="create-form" class="form-card">
    <div class="form-group">
        <label for="name">{{ t("create.name") }} *</label>
        <input type="text" id="name" name="name" required placeholder="{{ t('create.name_placeholder') }}">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="os_category">{{ t("create.os_category") }} *</label>
            <select id="os_category" name="os_category" required>
                <option value="">—</option>
            </select>
        </div>
        <div class="form-group">
            <label for="os_version">{{ t("create.os_version") }} *</label>
            <select id="os_version" name="os_version" required disabled>
                <option value="">{{ t("create.os_version_hint") }}</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="iso">{{ t("create.iso") }}</label>
        <input type="text" id="iso" name="iso" placeholder="{{ t('create.iso_hint') }}">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="ram">{{ t("create.ram") }}</label>
            <input type="number" id="ram" name="ram" value="4096" min="256">
        </div>
        <div class="form-group">
            <label for="vcpu">{{ t("create.vcpu") }}</label>
            <input type="number" id="vcpu" name="vcpu" value="2" min="1" max="32">
        </div>
        <div class="form-group">
            <label for="disk_size">{{ t("create.disk_size") }}</label>
            <input type="text" id="disk_size" name="disk_size" value="64G" placeholder="64G">
        </div>
    </div>

    <div class="form-group">
        <label for="boot">{{ t("create.boot") }}</label>
        <select id="boot" name="boot">
            <option value="cd">{{ t("create.boot_cd") }}</option>
            <option value="disk">{{ t("create.boot_disk") }}</option>
        </select>
    </div>

    <div id="error-msg" class="error-msg hidden"></div>
    <div id="success-msg" class="success-msg hidden"></div>

    <!-- Download progress overlay -->
    <div id="download-overlay" class="hidden" style="margin-top: 16px; padding: 16px; background: #f0f4ff; border-radius: 8px; border: 1px solid #c0c8e8;">
        <div id="download-title" style="font-weight: 600; margin-bottom: 8px; color: #333;">
            {{ t("create.downloading_iso") }}
        </div>
        <div style="background: #e0e8ff; border-radius: 4px; height: 20px; overflow: hidden; margin-bottom: 8px;">
            <div id="download-bar" style="background: #4f8eff; height: 100%; width: 0%; transition: width 0.4s ease; border-radius: 4px;"></div>
        </div>
        <div id="download-info" style="font-size: 13px; color: #555; display: flex; justify-content: space-between;">
            <span id="download-status-text"></span>
            <span id="download-pct">0%</span>
        </div>
        <div id="download-speed" style="font-size: 12px; color: #888; margin-top: 4px; text-align: right;"></div>
    </div>

    <div class="form-actions" id="form-actions">
        <a href="/" class="btn btn-secondary">{{ t("create.cancel") }}</a>
        <button type="submit" class="btn btn-primary" id="create-submit-btn">{{ t("create.create_btn") }}</button>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
const CAT_SELECT = document.getElementById("os_category");
const VER_SELECT = document.getElementById("os_version");
const BOOT_SELECT = document.getElementById("boot");
const ISO_INPUT = document.getElementById("iso");

async function loadCategories() {
    const res = await fetch("/api/os/categories");
    const cats = await res.json();
    CAT_SELECT.innerHTML = '<option value="">—</option>';
    cats.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        CAT_SELECT.appendChild(opt);
    });
}

async function loadVersions() {
    const catId = CAT_SELECT.value;
    VER_SELECT.innerHTML = '<option value="">Loading…</option>';
    VER_SELECT.disabled = true;
    if (!catId) {
        VER_SELECT.innerHTML = '<option value="">—</option>';
        return;
    }
    const res = await fetch(`/api/os/versions/${catId}`);
    const vers = await res.json();
    VER_SELECT.innerHTML = '<option value="">—</option>';
    vers.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v.id;
        opt.textContent = v.name;
        VER_SELECT.appendChild(opt);
    });
    VER_SELECT.disabled = false;
}

CAT_SELECT.addEventListener("change", loadVersions);

ISO_INPUT.addEventListener("input", () => {
    BOOT_SELECT.value = ISO_INPUT.value.trim() ? "cd" : "disk";
});

document.getElementById("create-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
        name:        form.name.value,
        os_category: form.os_category.value,
        os_version:  form.os_version.value,
        iso:         form.iso.value,
        ram:         form.ram.value,
        vcpu:        form.vcpu.value,
        disk_size:   form.disk_size.value,
        boot:        form.boot.value,
    };
    const errEl = document.getElementById("error-msg");
    const sucEl = document.getElementById("success-msg");
    errEl.classList.add("hidden");
    sucEl.classList.add("hidden");

    // Disable submit button to prevent double-submit
    const submitBtn = document.getElementById("create-submit-btn");
    submitBtn.disabled = true;

    try {
        const res = await fetch("/api/vm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || "Failed to create VM");

        // If download_task_id is returned, ISO download is in progress — show progress UI
        if (result.download_task_id) {
            document.getElementById("form-actions").classList.add("hidden");
            showDownloadProgress(result.download_task_id, result.name);
            return;
        }

        // ISO was provided or already exists — immediate success
        sucEl.textContent = `VM '${result.name}' created successfully!`;
        sucEl.classList.remove("hidden");
        submitBtn.disabled = false;
        setTimeout(() => window.location.href = "/", 1500);
    } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove("hidden");
        submitBtn.disabled = false;
    }
});

async function showDownloadProgress(taskId, vmName) {
    const overlay   = document.getElementById("download-overlay");
    const bar       = document.getElementById("download-bar");
    const pct       = document.getElementById("download-pct");
    const statusTxt = document.getElementById("download-status-text");
    const speedTxt  = document.getElementById("download-speed");

    overlay.classList.remove("hidden");

    const poll = setInterval(async () => {
        try {
            const res = await fetch(`/api/download/${encodeURIComponent(taskId)}/status`);
            if (!res.ok) return;
            const d = await res.json();

            // Update progress bar and text
            bar.style.width = d.progress + "%";
            pct.textContent = d.progress + "%";
            speedTxt.textContent = d.downloaded_human + " / " + d.total_human + "  •  " + d.speed_human;

            if (d.status === "downloading") {
                statusTxt.textContent = i18n.downloading_iso || "Downloading OS image…";
            }

            if (d.status === "complete") {
                clearInterval(poll);
                statusTxt.textContent = i18n.download_complete || "Download complete!";
                bar.style.width = "100%";
                pct.textContent = "100%";
                speedTxt.textContent = "";
                setTimeout(() => window.location.href = "/", 1000);
            } else if (d.status === "error") {
                clearInterval(poll);
                statusTxt.textContent = i18n.download_failed || "Download failed:";
                speedTxt.textContent = d.error || "";
                speedTxt.style.color = "#e53e3e";
                document.getElementById("form-actions").classList.remove("hidden");
                document.getElementById("create-submit-btn").disabled = false;
            }
        } catch (_) {}
    }, 1000);
}

loadCategories();
</script>
{% endblock %}
