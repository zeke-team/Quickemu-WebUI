{% extends "base.html" %}
{% block title %}Create VM — WebVM{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Create New VM</h1>
</div>

<form id="create-form" class="form-card">
    <div class="form-group">
        <label for="name">VM Name *</label>
        <input type="text" id="name" name="name" required placeholder="e.g. my-ubuntu">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="os_category">OS Category *</label>
            <select id="os_category" name="os_category" required>
                <option value="">— Select —</option>
            </select>
        </div>
        <div class="form-group">
            <label for="os_version">OS Version *</label>
            <select id="os_version" name="os_version" required disabled>
                <option value="">— Select category first —</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="iso">ISO File</label>
        <input type="text" id="iso" name="iso" placeholder="/path/to/install.iso">
        <small>Leave blank to boot from disk only</small>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="ram">RAM (MB)</label>
            <input type="number" id="ram" name="ram" value="4096" min="256">
        </div>
        <div class="form-group">
            <label for="vcpu">vCPUs</label>
            <input type="number" id="vcpu" name="vcpu" value="2" min="1" max="32">
        </div>
        <div class="form-group">
            <label for="disk_size">Disk Size</label>
            <input type="text" id="disk_size" name="disk_size" value="64G" placeholder="64G">
        </div>
    </div>

    <div class="form-group">
        <label for="boot">Boot Device</label>
        <select id="boot" name="boot">
            <option value="cd">CD / ISO</option>
            <option value="disk">Disk</option>
        </select>
    </div>

    <div id="error-msg" class="error-msg hidden"></div>
    <div id="success-msg" class="success-msg hidden"></div>

    <div class="form-actions">
        <a href="/" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Create VM</button>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
const CAT_SELECT  = document.getElementById("os_category");
const VER_SELECT  = document.getElementById("os_version");
const BOOT_SELECT = document.getElementById("boot");
const ISO_INPUT   = document.getElementById("iso");

// Load OS categories on page load
async function loadCategories() {
    const res  = await fetch("/api/os/categories");
    const cats = await res.json();
    CAT_SELECT.innerHTML = '<option value="">— Select —</option>';
    cats.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        CAT_SELECT.appendChild(opt);
    });
}

// Load versions when category changes
async function loadVersions() {
    const catId = CAT_SELECT.value;
    VER_SELECT.innerHTML = '<option value="">Loading…</option>';
    VER_SELECT.disabled = true;

    if (!catId) {
        VER_SELECT.innerHTML = '<option value="">— Select category first —</option>';
        return;
    }

    const res  = await fetch(`/api/os/versions/${catId}`);
    const vers = await res.json();
    VER_SELECT.innerHTML = '<option value="">— Select —</option>';
    vers.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v.id;
        opt.textContent = v.name;
        VER_SELECT.appendChild(opt);
    });
    VER_SELECT.disabled = false;

    // Auto-select ISO if available for macOS
    if (catId === "macos") {
        ISO_INPUT.placeholder = "/home/user/VMs/macos-sequoia/RecoveryImage.img";
    }
}

CAT_SELECT.addEventListener("change", loadVersions);

document.getElementById("create-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
        name:         form.name.value,
        os_category:  form.os_category.value,
        os_version:   form.os_version.value,
        iso:          form.iso.value,
        ram:          form.ram.value,
        vcpu:         form.vcpu.value,
        disk_size:    form.disk_size.value,
        boot:         form.boot.value,
    };

    const errEl = document.getElementById("error-msg");
    const sucEl = document.getElementById("success-msg");
    errEl.classList.add("hidden");
    sucEl.classList.add("hidden");

    try {
        const res = await fetch("/api/vm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || "Failed to create VM");
        sucEl.textContent = `VM '${result.name}' created successfully!`;
        sucEl.classList.remove("hidden");
        setTimeout(() => window.location.href = "/", 1500);
    } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove("hidden");
    }
});

loadCategories();
</script>
{% endblock %}
